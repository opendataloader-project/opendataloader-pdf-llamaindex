name: Lint

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install lint tools
        run: |
          python -m pip install --upgrade pip
          pip install "ruff>=0.5.0" "black>=24.0"
      - name: Run ruff
        run: ruff check .
      - name: Run black
        run: black --check .
